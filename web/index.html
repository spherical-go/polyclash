<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyClash - Spherical Go</title>
  <link rel="stylesheet" href="/web/css/style.css">
</head>
<body>
  <div id="app">
    <canvas id="board-canvas"></canvas>

    <div id="ui-overlay">
      <div id="score-panel">
        <div class="score-row">
          <span class="stone-dot black-dot"></span>
          <span id="score-black">Black: 0%</span>
        </div>
        <div class="score-row">
          <span class="stone-dot white-dot"></span>
          <span id="score-white">White: 0%</span>
        </div>
        <div class="score-row">
          <span class="stone-dot unclaimed-dot"></span>
          <span id="score-unclaimed">Unclaimed: 100%</span>
        </div>
      </div>

      <div id="turn-indicator">
        <span class="turn-dot" id="turn-dot"></span>
        <span id="turn-text">Black's turn</span>
        <span id="move-counter">Move: 0</span>
      </div>
    </div>

    <div id="status-bar">Welcome to PolyClash</div>

    <div id="game-controls">
      <button id="btn-new-local">New Local Game</button>
      <button id="btn-pass">Pass</button>
      <button id="btn-save-record">Save Record</button>
      <button id="btn-reset">Reset</button>
    </div>

    <div id="view-map">
      <div class="view-map-grid">
        <button class="view-btn" data-view="0">View 1</button>
        <button class="view-btn" data-view="1">View 2</button>
        <button class="view-btn" data-view="2">View 3</button>
        <button class="view-btn" data-view="3">View 4</button>
        <button class="view-btn" data-view="4">View 5</button>
        <button class="view-btn" data-view="5">View 6</button>
        <button class="view-btn" data-view="6">View 7</button>
        <button class="view-btn" data-view="7">View 8</button>
      </div>
    </div>

    <div id="connection-panel">
      <label for="server-url">Server URL</label>
      <input type="text" id="server-url" value="http://localhost:3302" placeholder="http://localhost:3302">
      <button id="btn-new-network">New Network Game</button>
      <div class="join-row">
        <input type="text" id="join-game-id" placeholder="Game ID">
        <button id="btn-join-game">Join Game</button>
      </div>
    </div>
  </div>

  <script src="/web/vendor/three.min.js"></script>
  <script src="/web/vendor/socket.io.min.js"></script>
  <script src="/web/vendor/OrbitControls.js"></script>
  <script src="/web/js/light-rules.js"></script>
  <script src="/web/js/board-renderer.js"></script>
  <script src="/web/js/game-client.js"></script>
  <script>
    // Auto-fill server token from URL query parameter (for solo mode)
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      if (token) {
        window._serverToken = token;
      }
    })();
  </script>
  <script src="/web/js/main.js"></script>
</body>
</html>
