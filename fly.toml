app = "polyclash"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "polyclash_data"
  destination = "/data"

[env]
  PORT = "3302"
  POLYCLASH_MAX_ROOMS = "8"
  POLYCLASH_INVITES = "5"
  POLYCLASH_STORAGE_DB = "/data/polyclash_games.db"
  POLYCLASH_AUTH_DB = "/data/polyclash_users.db"

[http_service]
  internal_port = 3302
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
