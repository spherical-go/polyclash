version: "3.8"

services:
  polyclash:
    build: .
    ports:
      - "3302:3302"
    environment:
      - POLYCLASH_SERVER_TOKEN=${POLYCLASH_SERVER_TOKEN:-}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
